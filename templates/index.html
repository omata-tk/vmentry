<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>VM Entry Menu</title>
  <style>
    body { margin: 0; font-family: "Hiragino Sans", "Yu Gothic", "Noto Sans JP", sans-serif; background: linear-gradient(180deg, #f8fafc, #eef4f8); color: #0f172a; }
    .shell { max-width: 960px; margin: 0 auto; padding: 28px 18px 56px; }
    .topbar { display: flex; justify-content: flex-end; margin-bottom: 14px; }
    .user-chip { display: inline-flex; align-items: center; gap: 12px; padding: 8px 12px; border-radius: 999px; background: rgba(15,23,42,.08); color: #0f172a; font-weight: 700; font-size: .86rem; }
    .top-actions { display: inline-flex; align-items: center; gap: 8px; }
    .logout-link { color: #0f766e; text-decoration: none; font-weight: 800; }
    .logout-link:hover { text-decoration: underline; }
    .hero { border-radius: 28px; padding: 28px; color: #f8fafc; background: linear-gradient(135deg, #0f172a, #0f766e); box-shadow: 0 24px 70px rgba(15, 23, 42, .18); }
    .hero h1 { margin: 0; font-size: clamp(2rem, 4vw, 3.2rem); line-height: 1.08; }
    .hero p { margin: 14px 0 0; max-width: 760px; color: rgba(248,250,252,.9); line-height: 1.8; }
    .menu { display: grid; gap: 16px; margin-top: 20px; }
    .card { border-radius: 24px; background: rgba(255,255,255,.86); border: 1px solid rgba(148,163,184,.24); box-shadow: 0 24px 60px rgba(15,23,42,.08); padding: 22px; }
    .card h2 { margin: 0 0 8px; }
    .card p { margin: 0 0 16px; color: #64748b; line-height: 1.7; }
    .menu-link { display: inline-flex; align-items: center; justify-content: center; border: 0; border-radius: 14px; padding: 14px 18px; font: inherit; font-weight: 800; cursor: pointer; color: white; background: linear-gradient(135deg, #0f766e, #2563eb); text-decoration: none; }
    .sub-link { display: inline-flex; align-items: center; justify-content: center; border-radius: 14px; padding: 14px 18px; font: inherit; font-weight: 800; color: #0f766e; background: #fff; border: 1px solid rgba(15,118,110,.28); text-decoration: none; }
    @media (max-width: 720px) { .shell { padding: 16px 12px 28px; } .hero, .card { padding: 18px; } .menu-link, .sub-link { width: 100%; box-sizing: border-box; } }
  </style>
</head>
<body>
  <main class="shell">
    <div class="topbar">
      <div class="user-chip">
        <span>{{ user_name }}</span>
        <span class="top-actions">
          <a class="logout-link" href="{{ url_for('logout') }}">ログアウト</a>
        </span>
      </div>
    </div>

    <section class="hero">
      <h1>VM Entry</h1>
      <p>登録画面や管理画面へ進むためのメニューです。今後ここに追加機能を集約できます。</p>
    </section>

    <section class="menu">
      {% if not is_admin %}
      <div class="card">
        <h2>登録画面</h2>
        <p>Redmine チケット登録と VM 情報入力を行います。</p>
        <a class="menu-link" href="{{ url_for('entry') }}">登録画面を開く</a>
      </div>
      {% endif %}

      {% if is_admin %}
      <div class="card">
        <h2>管理画面</h2>
        <p>Redmine 設定、Hyper-V ホスト設定、テンプレート更新を行います。</p>
        <a class="menu-link" href="{{ url_for('admin') }}">管理画面を開く</a>
      </div>
      {% endif %}
    </section>
  </main>
</body>
</html>
